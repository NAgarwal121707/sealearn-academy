{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Login</h1>
  <p class="muted">Students login to learn. SeaLearn owner logs in here using the superuser/admin account.</p>
  <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn full">Login</button></form>
  <p><a href="{% url 'password_reset' %}">Forgot password?</a></p>
  <p>New student? <a href="{% url 'student_signup' %}">Create student account</a></p>
</div>
{% endblock %}
