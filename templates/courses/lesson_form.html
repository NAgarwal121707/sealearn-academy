{% extends 'base.html' %}
{% block content %}
<section class="form-shell">
  <div class="form-card">
    <p class="eyebrow">Owner Studio</p>
    <h1>{{ title }}</h1>
    <p class="muted">Choose Recorded for uploaded MP4/video URL lessons, or Live for Zoom/Meet sessions with date and time.</p>
    <form method="post" enctype="multipart/form-data" class="stack-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Save video / live class</button>
      <a class="link-muted" href="{% url 'owner_dashboard' %}">Back to owner dashboard</a>
    </form>
  </div>
</section>
{% endblock %}
